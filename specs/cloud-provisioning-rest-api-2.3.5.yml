openapi: 3.0.1
info:
  title: Cloud Provisioning REST API
  description: |
    # Cloud Provisioning REST API

    ## Abstract

    The Open-Xchange Cloud Provisioning REST API can be used to provision Contexts and users. It consists of 4 main parts explained below.

    ## Brand management

    These API methods can be used to define a default theming for all created contexts if not overridden on context level.
    It is also possible to define the contact information shown in the about dialogue.

    ## Context management

    The Context management API can be used to create contexts. Contexts are containers for users.

    ## User management

    The User management API is used to create users within contexts.

    ## Mail domain management

    Use the Mail domain management API to create shared mail domains, catch-all accounts for domains
    and manage mail forwarding accounts/aliases.

    ## HTTP Headers

    ### X-Trace-Id

    Mirrors the header with the same name if it has been specified in the request, sending back the same value for tracing and debugging purposes.

    ## Error handling

    ### API Version 1

    Error responses comply with <https://github.com/blongden/vnd.error>

    ### API Version 2

    Beginning with generation 2 of Cloud-API, error responses are conforming to <https://jsonapi.org/format/#errors>.
    The array of errors always only consist of one entry.
    Each entry contains the following elements:

    - **code:** fixed code for that specific error
    - **id:** generated, unique id
    - **status:** HTTP status code
    - **title:** error message belonging to that error

    #### Example error response

    ```JSON
    {
        "errors": [
            {
                "code": "8",
                "id": "92f3ede7-21b1-4fb5-a340-e609dbb90585",
                "status": "409",
                "title": "Context \"test1\" already exists"
            }
        ]
    }
    ```
    #### List of possible error codes and messages

    | Code | Message                                                                         | HTTP Code                                                           |
    | ---- | ------------------------------------------------------------------------------- | ------------------------------------------------------------------- |
    | 1    | User not found                                                                  | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 2    | Authentication failed                                                           | [401](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/401) |
    | 3    | Context \"%s\" not found                                                        | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 4    | Either name or id parameter must be provided                                    | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 5    | Unknown error                                                                   | [400](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/400) |
    | 6    | There's a maintenance ongoing, please try again later                           | [503](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/503) |
    | 7    | Mandatory parameters missing: %s                                                | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 8    | Context \"%s\" already exists                                                   | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 9    | Missing one or more context admin parameters: %s                                | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 10   | One or more services not available                                              | [503](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/503) |
    | 11   | Either only unifiedQuota or mail- and fileQuota can be specified                | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 12   | Quota must be either omitted or a positive value                                | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 13   | Invalid CoS values: %s                                                          | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 14   | The mail domain is already in use                                               | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 15   | A parameter contains invalid characters \"%s\"                                  | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 16   | Setting dark logo requires to provide the light logo as well                    | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 17   | Only one of \"%s\" allowed                                                      | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 18   | At least one of \"%s\" must be specified                                        | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 19   | User to reassign \"%s\" does not exist                                          | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 20   | Login \"%s\" not found                                                          | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 21   | Alias \"%s\" not found                                                          | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 22   | Forward or recipient \"%s\" not found                                           | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 23   | Forward recipient \"%s\" not found                                              | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 24   | Invalid mail address: \"%s\"                                                    | [400](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/400) |
    | 25   | Maximum amount of external forward recipients exceeded                          | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 26   | Maximum amount of internal forward recipients exceeded                          | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 27   | Shared domain \"%s\" not found                                                  | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 28   | Shared domain \"%s\" already exists                                             | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 29   | No such catchall user \"%s\"                                                    | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 30   | Catchall domain \"%s\" not found assigned to user \"%s\"                        | [404](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/404) |
    | 31   | Catchall domain \"%s\" already exists                                           | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 32   | User \"%s\" already exists                                                      | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 33   | Mail address \"%s\" already in use                                              | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 34   | The display name is already in use                                              | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 35   | Invalid timezone                                                                | [400](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/400) |
    | 36   | Invalid spamlevel \"%s\"                                                        | [400](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/400) |
    | 37   | The list of aliases does not include the current mail address                   | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 38   | Unable to create more users. The maximum amount of users for this context is %s | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 39   | Rate limited, too many requests                                                 | [429](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/429) |
    | 40   | The shared mail domain is already in use                                        | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 41   | Forward \"%s\" already exists                                                   | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
    | 42   | Unexpected Email Backup API Error                                               | [500](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/500) |
    | 43   | Alias already exists                                                            | [409](https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/409) |
  version: 2.3.5
security:
- BrandAuth: []
tags:
- name: Mail domain management API v2
  description: "This provides functionality for managing mail domains, catchalls,\
    \ aliases, forwards and shared domains.The spamlevel has to be one of <code>low</code>,\
    \ <code>medium</code> or <code>high</code>. If not provided, <code>high</code>\
    \ will be used."
- name: User management API v2
  description: |
    This API provides functionality for managing users.

    The spamlevel has to be one of <code>low</code>, <code>medium</code> or <code>high</code>. If not provided, <code>high</code> will be used.
    **Note** that some resource settings are optional and in that case will not be returned by the `list`
    and `get` calls. That applies to all settings that do not have a default and have not
    been set explicitly.
- name: Brand management API v2
  description: |
    This API contains endpoints for retrieving, changing, and removing brand theming settings, such as colors and
    contact information.

    **Note** that some resource settings such as theme are optional and in that case will not be returned
    by the `list` and `get` calls. That applies to all settings that do not have a default and have not
    been set explicitly.
- name: Context management API v2
  description: |
    This API contains endpoints for retrieving, changing, removing and creating contexts.

    **Note** that some resource settings such as theme are optional and in that case will not be returned
    by the `list` and `get` calls. That applies to all settings that do not have a default and have not
    been set explicitly.
- name: Mail domain management API v1
  description: "This provides functionality for managing mail domains, \ncatchalls,\
    \ aliases, forwards and shared domains. ⚠️**Note:** Version 1 of this API is deprecated\
    \ and will be removed in the future.⚠️"
- name: User management API v1
  description: This provides functionality for managing users. ⚠️**Note:** Version
    1 of this API is deprecated and will be removed in the future.⚠️
- name: Brand management API v1
  description: "This contains endpoints for retrieving, changing, and removing \n\
    brand theming settings, such as colors and contact information. ⚠️**Note:** Version\
    \ 1 of this API is deprecated and will be removed in the future.⚠️"
- name: Context management API v1
  description: "This contains endpoints for retrieving, changing, removing \nand creating\
    \ contexts. ⚠️**Note:** Version 1 of this API is deprecated and will be removed\
    \ in the future.⚠️"
paths:
  /cloudapi/v1/brand/theme:
    get:
      tags:
      - Brand management API v1
      summary: Get brand theming
      operationId: getThemeSettings
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "401":
          description: Authentication failed
      deprecated: true
    post:
      tags:
      - Brand management API v1
      summary: Change theming of brand
      description: Change brand related theming such as colors and contact information.
        Note that a dark logo can only be set in case a light logo is provided as
        well.
      externalDocs:
        url: https://documentation.open-xchange.com/8/ui/theming/dynamic-theming.html
      operationId: setThemeSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Theme"
        required: true
      responses:
        "401":
          description: Authentication failed
        "400":
          description: Parameter error
      deprecated: true
    delete:
      tags:
      - Brand management API v1
      summary: Remove the complete theming of brand
      description: Remove the complete theming brand related theming such as colors
        and contact information.
      externalDocs:
        url: https://documentation.open-xchange.com/8/ui/theming/dynamic-theming.html
      operationId: removeThemeSettings
      responses:
        "401":
          description: Authentication failed
      deprecated: true
  /cloudapi/v1/contexts:
    get:
      tags:
      - Context management API v1
      summary: List contexts
      description: Lists all context matching the specified search pattern. The default
        pattern is '*'. The pattern is applied to the name of the contexts
      operationId: list
      parameters:
      - name: pattern
        in: query
        schema:
          type: string
          nullable: true
          default: '*'
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GetContext v1"
        "401":
          description: Authentication failed
      deprecated: true
    post:
      tags:
      - Context management API v1
      summary: Create context
      description: |-
        Create a context. Returns the created context including its generated id.

        Example of a context creation using <a href="https://httpie.io/cli">httpie</a>:

        <pre><code class="language-shell">http --auth mybrand:secret POST https://provisioning.eu.appsuite.cloud/cloudapi/v1/contexts name=acme</code></pre>
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContext v1"
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContext v1"
        "401":
          description: Authentication failed
        "409":
          description: Wrong or missing parameters / Context already exists
        "400":
          description: Other errors
      deprecated: true
  /cloudapi/v1/contexts/{nameOrId}:
    get:
      tags:
      - Context management API v1
      summary: Get context data
      description: Retrieve context data. The path parameter is either the context
        name or its generated id
      operationId: get
      parameters:
      - name: nameOrId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContext v1"
        "401":
          description: Authentication failed
        "404":
          description: Context not found
      deprecated: true
    put:
      tags:
      - Context management API v1
      summary: Change Context
      description: Change context data. The path parameter is either the context name
        or its generated id
      operationId: change
      parameters:
      - name: nameOrId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeContext v1"
        required: true
      responses:
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "400":
          description: Other errors
      deprecated: true
    delete:
      tags:
      - Context management API v1
      summary: Delete Context
      description: Delete a context. The path parameter is either the context name
        or its generated id
      operationId: delete
      parameters:
      - name: nameOrId
        in: path
        required: true
        schema:
          type: string
      responses:
        "401":
          description: Authentication failed
        "404":
          description: Context not found
      deprecated: true
  /cloudapi/v1/mail/alias/{alias}/exists:
    head:
      tags:
      - Mail domain management API v1
      summary: Check whether given alias exists
      description: Check whether given mail alias exists.
      operationId: existsAlias
      parameters:
      - name: alias
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Alias does not exist
      deprecated: true
  /cloudapi/v1/mail/catchall:
    get:
      tags:
      - Mail domain management API v1
      summary: Get all domain catchalls
      description: Get all domain catchalls. The name or id of the context must be
        specified using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: getDomainCatchalls
      parameters:
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainCatchall"
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
    post:
      tags:
      - Mail domain management API v1
      summary: Add domain catchall
      description: Add domain catchall. The name or id of the context must be specified
        using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: createDomainCatchall
      parameters:
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainCatchall"
        required: true
      responses:
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
  /cloudapi/v1/mail/catchall/domain/{domain}/login/{login}:
    delete:
      tags:
      - Mail domain management API v1
      summary: Remove domain catchall
      description: Remove domain catchall. The name or id of the context must be specified
        using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: removeDomainCatchall
      parameters:
      - name: domain
        in: path
        required: true
        schema:
          type: string
      - name: login
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
  /cloudapi/v1/mail/forwards:
    get:
      tags:
      - Mail domain management API v1
      summary: Get all mail forwards
      description: Get all mail forwards. The name or id of the context must be specified
        using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: getMailForwards
      parameters:
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MailForward"
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
    post:
      tags:
      - Mail domain management API v1
      summary: Create or replace a forward
      description: Create or replace a forward with the given address. The name or
        id of the context must be specified using either the <i>name</i> or the <i>id</i>
        query parameter.
      operationId: createMailForward
      parameters:
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailForward"
        required: true
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
    delete:
      tags:
      - Mail domain management API v1
      summary: Delete all forwards in context
      description: Delete all forwards in context. The name or id of the context must
        be specified using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: removeAllMailForwards
      parameters:
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Context not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
  /cloudapi/v1/mail/forwards/{address}:
    get:
      tags:
      - Mail domain management API v1
      summary: Get recipients of forward
      description: Get recipients of forward. The name or id of the context must be
        specified using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: getMailForwardRecipients
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "401":
          description: Authentication failed
        "404":
          description: Context or forward not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
    put:
      tags:
      - Mail domain management API v1
      summary: Add recipients to forward
      description: Add recipients to forward. The name or id of the context must be
        specified using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: addRecipientsToMailForward
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      requestBody:
        content:
          application/json:
            schema:
              minItems: 1
              type: array
              items:
                type: string
        required: true
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Context or forward not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
    delete:
      tags:
      - Mail domain management API v1
      summary: Delete forward
      description: Delete forward. The name or id of the context must be specified
        using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: removeMailForward
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Context or forward not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
  /cloudapi/v1/mail/forwards/{address}/exists:
    head:
      tags:
      - Mail domain management API v1
      summary: Does the forward exist in context?
      description: Does the forward exist in context? The name or id of the context
        must be specified using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: existsMailForward
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Context or forward not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
  /cloudapi/v1/mail/forwards/{address}/{recipient}:
    delete:
      tags:
      - Mail domain management API v1
      summary: Delete recipient from forward
      description: Delete recipient from forward. The name or id of the context must
        be specified using either the <i>name</i> or the <i>id</i> query parameter.
      operationId: removeRecipientFromMailForward
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      - name: recipient
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        schema:
          type: integer
          format: int32
          nullable: true
      responses:
        "200":
          description: Ok
        "401":
          description: Authentication failed
        "404":
          description: Context or forward not found
        "409":
          description: Neither Context name nor id specified in query
      deprecated: true
  /cloudapi/v1/mail/forwards/{address}/{recipient}/exists:
    head:
      tags:
      - Mail domain management API v1
      summary: Does the forward recipient exist in forward of context?
      description: Does the forward recipient exist in forward of context? The name
        or id of the context must be specified using either the <i>name</i> or the
        <i>id</i> query parameter.
      operationId: existsMailForwardRecipient
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      - name: recipient
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: query
        schema:
          type: string
